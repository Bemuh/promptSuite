<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Flow Studio - Pro</title>

    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%2360a5fa' stroke-width='8'/><path d='M30 50 L70 50 M50 30 L50 70' stroke='%2360a5fa' stroke-width='8' stroke-linecap='round'/><path d='M40 40 L60 60 M60 40 L40 60' stroke='%2393c5fd' stroke-width='4' stroke-linecap='round'/></svg>">

    <style>
        :root {
            --bg-color: #000000;
            --container-bg: #0f172a;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --organic-blue: #93c5fd;
            --accent-blue: #60a5fa;
            --button-blue: #1e293b;
            --border-color: #334155;
            --tab-inactive: #0f172a;
            --danger: #7f1d1d;
            --input-bg: #000000;
        }

        .light-theme {
            --bg-color: #f8fafc;
            --container-bg: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --organic-blue: #3b82f6;
            --accent-blue: #2563eb;
            --button-blue: #f1f5f9;
            --border-color: #e2e8f0;
            --tab-inactive: #f8fafc;
            --danger: #fee2e2;
            --input-bg: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s;
        }

        .nav-sidebar {
            display: flex;
            flex-direction: column;
            width: 200px;
            min-width: 200px;
            background: var(--container-bg);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            overflow: hidden;
        }

        .nav-sidebar-header {
            padding: 15px;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .tabs-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            padding: 5px 0;
        }

        .tabs-container::-webkit-scrollbar {
            width: 4px;
        }

        .tabs-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .tabs {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tab {
            padding: 10px 12px;
            cursor: grab;
            background: transparent;
            border: none;
            border-left: 3px solid transparent;
            border-radius: 0;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
        }

        .tab:hover {
            background: var(--button-blue);
        }

        .tab:active {
            cursor: grabbing;
        }

        .tab.active {
            background: var(--button-blue);
            color: var(--accent-blue);
            border-left: 3px solid var(--accent-blue);
        }

        .tab-rename-input {
            background: var(--input-bg);
            border: 1px solid var(--accent-blue);
            color: var(--text-main);
            font-family: inherit;
            font-size: inherit;
            width: 100px;
            outline: none;
            border-radius: 4px;
            padding: 2px 5px;
        }

        .tab-close {
            width: 18px;
            height: 18px;
            border-radius: 40px;
            font-size: 10px;
            opacity: 0.4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            flex-shrink: 0;
        }

        .tab-close:hover {
            background: #ef4444;
            color: white;
            opacity: 1;
        }

        .add-tab-btn {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: var(--accent-blue);
            padding: 12px 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .add-tab-btn:hover {
            background: var(--button-blue);
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        .menu-container {
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }

        .hamburger-btn {
            background: var(--button-blue);
            border: 1px solid var(--border-color);
            color: var(--accent-blue);
            width: 45px;
            height: 45px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .hamburger-btn:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
        }

        .menu-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: none;
            flex-direction: column;
            padding: 8px;
            gap: 4px;
            min-width: 180px;
            z-index: 200;
        }

        .menu-dropdown.show {
            display: flex;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            width: 100%;
        }

        .workspace {
            flex: 3;
            min-width: 0;
        }

        .container {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .section-toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 12px;
        }

        .section-toggle-btn:hover {
            color: var(--accent-blue);
        }

        .collapsible-content.collapsed {
            display: none;
        }

        textarea {
            width: 100%;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: "Cascadia Code", monospace;
            font-size: 13px;
            margin-bottom: 15px;
            resize: vertical;
            box-sizing: border-box;
            padding: 12px;
            outline: none;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: var(--accent-blue);
        }

        .template-area {
            height: 100px;
            border-style: dashed;
            border-width: 2px;
        }

        .editor-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .editor-wrapper:focus-within {
            border-color: var(--accent-blue);
        }

        .line-numbers {
            width: auto;
            min-width: 20px;
            background: var(--container-bg);
            color: var(--text-dim);
            font-family: "Cascadia Code", monospace;
            font-size: 13px;
            line-height: 1.6;
            padding: 12px 4px 12px 4px;
            text-align: right;
            user-select: none;
            overflow: hidden;
            border-right: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .editor-wrapper textarea {
            flex: 1;
            margin-bottom: 0;
            border: none;
            border-radius: 0;
            resize: vertical;
            min-height: 80px;
        }

        .editor-wrapper textarea:focus {
            border: none;
            outline: none;
        }

        .info-summary-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 11px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button.primary-btn {
            flex: 1;
            background: var(--button-blue);
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
            padding: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button.primary-btn:hover {
            background: var(--accent-blue);
            color: var(--bg-color);
            border-color: var(--accent-blue);
        }

        .btn-util {
            background: var(--button-blue);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
            text-align: left;
        }

        .btn-util:hover {
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .counter {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 500;
        }

        .mod-label {
            font-size: 9px;
            color: var(--text-dim);
            font-style: italic;
        }

        .total-counter {
            color: var(--accent-blue);
            font-weight: bold;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            color: var(--text-main);
        }

        .hidden {
            display: none;
        }

        .dynamic-var-block {
            margin-bottom: 5px;
        }

        .shared-var-block {
            margin-bottom: 5px;
            border-left: 3px solid var(--accent-blue);
            padding-left: 8px;
        }

        .shared-var-badge {
            font-size: 8px;
            background: var(--accent-blue);
            color: var(--bg-color);
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
            margin-left: 6px;
        }
    </style>
</head>

<body class="dark-theme">

    <nav class="nav-sidebar">
        <div class="nav-sidebar-header" id="nav-header-action"
            style="cursor: pointer; display: flex; justify-content: space-between; align-items: center; position: relative;">
            <span>Flows</span>
            <span style="font-size: 0.65rem; opacity: 0.6;">☰</span>
            <div id="menu-dropdown" class="menu-dropdown"
                style="position: absolute; top: 100%; left: 0; right: 0; border-radius: 0; border-left: none; border-right: none;">
                <button class="btn-util" id="btn-theme-toggle">Theme: Dark</button>
                <button class="btn-util" id="btn-lang-toggle">Language: EN</button>
                <button class="btn-util" id="btn-tutorial-trigger">Tutorial / Help</button>
                <hr style="border: 0; border-top: 1px solid var(--border-color); width: 100%;">
                <button class="btn-util" onclick="exportData()" id="lang-export">Export Config</button>
                <button class="btn-util" onclick="triggerImport()" id="lang-import">Import Config</button>
                <button class="btn-util" style="color: #f87171;" onclick="showModal('clear_storage')"
                    id="lang-clear-storage">Clear Studio Data</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </div>
        </div>
        <button class="add-tab-btn" id="add-tab-action">+ New Flow</button>
        <div class="tabs-container">
            <div id="tabs-list" class="tabs"></div>
        </div>
    </nav>

    <div class="content-area">

        <div class="main-layout">
            <div class="workspace">
                <div class="container">
                    <div style="display:flex; justify-content: space-between; align-items: center;">
                        <button class="section-toggle-btn" onclick="toggleSection('system-wrapper')"
                            id="lang-toggle-sys">System Block ▾</button>
                        <span id="ts-sys" class="mod-label"></span>
                    </div>
                    <div id="system-wrapper" class="collapsible-content">
                        <div class="system-toggle"
                            style="margin-bottom: 10px; font-size: 0.8rem; color: var(--text-dim);">
                            <input type="checkbox" id="system-check" onchange="toggleSystem()">
                            <label for="system-check" style="cursor: pointer;" id="lang-enable-sys">Enable System Prompt
                                Block</label>
                        </div>
                        <div class="editor-wrapper hidden" id="systemPrompt-wrapper">
                            <div class="line-numbers" id="systemPrompt-lines">1</div>
                            <textarea id="systemPrompt" class="editor" oninput="handleFieldInput('sys')"
                                placeholder="System Persona/Rules..."></textarea>
                        </div>
                    </div>

                    <div style="display:flex; justify-content: space-between; align-items: center;">
                        <button class="section-toggle-btn" onclick="toggleSection('template-wrapper')"
                            id="lang-toggle-tpl">Instruction Template ▾</button>
                        <span id="ts-tpl" class="mod-label"></span>
                    </div>
                    <div id="template-wrapper" class="collapsible-content">
                        <div class="editor-wrapper">
                            <div class="line-numbers" id="template-lines">1</div>
                            <textarea id="template" class="template-area editor"
                                oninput="handleFieldInput('tpl')"></textarea>
                        </div>
                    </div>

                    <div id="dynamic-inputs-container"></div>

                    <div class="info-summary-bar">
                        <div id="char-breakdown" class="counter">0 chars</div>
                        <div id="total-pipeline-info" class="total-counter">Total: 0 chars</div>
                    </div>

                    <div class="button-group">
                        <button class="primary-btn" onclick="generate()" id="lang-generate">Generate & Copy
                            Prompt</button>
                        <div class="menu-container">
                            <button class="hamburger-btn" id="cog-action">⚙</button>
                            <div id="cog-dropdown" class="menu-dropdown">
                                <button class="btn-util" onclick="downloadMarkdown()" id="lang-md">Download .md</button>
                                <button class="btn-util" onclick="copySystemOnly()" id="lang-copy-sys">Copy Sys
                                    Only</button>
                                <button class="btn-util" style="color: #f87171;" onclick="showModal('clear')"
                                    id="lang-clear">Clear Inputs</button>
                            </div>
                        </div>
                    </div>

                    <div id="status"
                        style="margin-top: 15px; text-align: center; color: var(--accent-blue); font-weight: bold; visibility: hidden;">
                        READY</div>
                </div>
            </div>

        </div>

    </div><!-- end content-area -->

    <div id="modal-overlay">
        <div class="modal">
            <p id="modal-text" style="margin-bottom: 25px; line-height: 1.5; font-weight: 500;"></p>
            <div id="tutorial-content" class="tutorial-text hidden"></div>
            <div style="display:flex; gap:10px; justify-content: center;">
                <button id="modal-confirm-btn" class="primary-btn" onclick="confirmAction()"
                    style="padding: 10px 20px; font-size: 0.8rem;"></button>
                <button id="modal-cancel-btn" class="btn-util" onclick="closeModal()"
                    style="padding: 10px 20px; flex: 1; text-align: center; font-size: 0.8rem;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            en: {
                theme_dark: "Theme: Dark", theme_light: "Theme: Light", lang: "Language: EN", tutorial: "Tutorial / Help",
                export: "Export Config", import: "Import Config", download_md: "Download .md",
                copy_sys: "Copy Sys Only", toggle_sys: "System Block ▾", toggle_tpl: "Instruction Template ▾",
                enable_sys: "Enable System Prompt Block", total: "Total Pipeline",
                generate: "Generate & Copy Prompt", clear: "Clear Inputs", mod: "Modified",
                clear_storage: "Clear Studio Data", confirm: "Confirm", ok: "OK",
                flows: "Flows", new_flow: "+ New Flow", cancel: "Cancel",
                sys_placeholder: "System Persona/Rules...",
                char_sys: "Sys", char_tpl: "Tpl", char_dyn: "Dynamic Vars",
                shared: "SHARED",
                status_ready: "READY", status_copied: "PROMPT COPIED", status_sys_copied: "SYSTEM COPIED",
                msg_clear: "Clear all input fields for this tab?",
                msg_delete: "Permanently delete this tab?",
                msg_clear_storage: "Permanently delete ALL tabs and local settings? This cannot be undone.",
                msg_last_tab: "Cannot delete the last remaining tab.",
                tut_title: "Tutorial: AI Flow Studio",
                tut_body: `
<div style="text-align:left; line-height:1.7; font-size:0.85rem;">

<h3 style="color:var(--accent-blue); margin-top:0;">Getting Started</h3>
<p>AI Flow Studio helps you build reusable, modular prompts for AI assistants. Instead of rewriting prompts from scratch every time, you create <strong>templates</strong> with placeholders that get filled in automatically.</p>

<h3 style="color:var(--accent-blue);">1. Flows (Tabs)</h3>
<p>Each <strong>flow</strong> is an independent prompt workspace shown in the left sidebar.</p>
<ul>
  <li><strong>Create a flow:</strong> Click <em>"+ New Flow"</em> at the top of the sidebar.</li>
  <li><strong>Switch flows:</strong> Click on any flow name in the sidebar.</li>
  <li><strong>Rename a flow:</strong> Double-click the flow name to edit it.</li>
  <li><strong>Reorder flows:</strong> Drag and drop flows in the sidebar to rearrange them.</li>
  <li><strong>Delete a flow:</strong> Click the <strong>✕</strong> button on a flow tab. You cannot delete the last remaining flow.</li>
</ul>

<h3 style="color:var(--accent-blue);">2. System Block</h3>
<p>The <strong>System Block</strong> lets you define a system-level persona or rules (e.g., "You are a helpful coding assistant").</p>
<ul>
  <li>Check the <em>"Enable System Prompt Block"</em> checkbox to show the editor.</li>
  <li>When enabled, the generated output will include a <code>SYSTEM:</code> and <code>USER:</code> section.</li>
  <li>You can collapse this section by clicking its header.</li>
</ul>

<h3 style="color:var(--accent-blue);">3. Instruction Template</h3>
<p>This is the main body of your prompt. Write your instructions here and use <strong>placeholders</strong> to make them reusable.</p>
<ul>
  <li>Type any <code>{{TAG_NAME}}</code> and an input field for that variable will appear automatically below.</li>
  <li>You can collapse this section by clicking its header.</li>
</ul>

<h3 style="color:var(--accent-blue);">4. Dynamic Variables</h3>
<p>Any <code>{{TAG}}</code> in your template creates an input field automatically. Fill in the value and it will be injected when you generate.</p>
<p><strong>Example:</strong> A template like <code>Translate {{TEXT}} to {{LANGUAGE}}</code> creates two input fields: one for TEXT and one for LANGUAGE.</p>

<h3 style="color:var(--accent-blue);">5. Shared Variables</h3>
<p>Use <code>{{SHARED:name}}</code> for variables that are shared across <strong>all</strong> flows. If you update a shared variable in one flow, the change applies everywhere.</p>
<p><strong>Example:</strong> <code>{{SHARED:project_context}}</code> lets you define your project context once and reuse it in every flow.</p>

<h3 style="color:var(--accent-blue);">6. Flow Linking</h3>
<p>Use <code>{{TAB:FlowName}}</code> to include the <strong>generated output</strong> of another flow inside your current template. This lets you chain prompts together into a pipeline.</p>
<p><strong>Example:</strong> If you have a flow named "Outline", you can reference it with <code>{{TAB:Outline}}</code> in another flow.</p>
<p><em>Note:</em> Circular dependencies (Flow A referencing Flow B, which references Flow A) are detected and will show an error.</p>

<h3 style="color:var(--accent-blue);">7. Generate & Copy</h3>
<p>Click <strong>"Generate & Copy Prompt"</strong> to assemble your final prompt with all variables resolved and copy it to the clipboard, ready to paste into any AI chat.</p>

<h3 style="color:var(--accent-blue);">8. Extra Tools (⚙ Menu)</h3>
<ul>
  <li><strong>Download .md:</strong> Save the current template as a Markdown file.</li>
  <li><strong>Copy Sys Only:</strong> Copy just the system prompt to the clipboard.</li>
  <li><strong>Clear Inputs:</strong> Reset all input fields in the current flow (template and variables stay, values are cleared).</li>
</ul>

<h3 style="color:var(--accent-blue);">9. Settings (☰ Sidebar Menu)</h3>
<ul>
  <li><strong>Theme:</strong> Switch between Dark and Light mode.</li>
  <li><strong>Language:</strong> Switch between English and Spanish.</li>
  <li><strong>Export Config:</strong> Download all your flows and shared variables as a JSON file for backup or sharing.</li>
  <li><strong>Import Config:</strong> Load a previously exported JSON file to restore your flows.</li>
  <li><strong>Clear Studio Data:</strong> Delete all flows, variables, and settings. <em>This cannot be undone.</em></li>
</ul>

<h3 style="color:var(--accent-blue);">10. Tips</h3>
<ul>
  <li>All data is saved automatically in your browser (localStorage).</li>
  <li>Each field shows a <em>"Modified"</em> timestamp so you know when it was last edited.</li>
  <li>The info bar at the bottom shows character counts for System, Template, and Dynamic Variables.</li>
  <li>Press <strong>Tab</strong> inside any editor to insert a tab character instead of moving focus.</li>
  <li>Press <strong>Enter</strong> to auto-indent based on the current line's indentation.</li>
</ul>
</div>`
            },
            es: {
                theme_dark: "Tema: Oscuro", theme_light: "Tema: Claro", lang: "Idioma: ES", tutorial: "Tutorial / Ayuda",
                export: "Exportar Config", import: "Importar Config", download_md: "Descargar .md",
                copy_sys: "Copiar Sys", toggle_sys: "Bloque Sistema ▾", toggle_tpl: "Plantilla Instrucción ▾",
                enable_sys: "Habilitar Bloque de Sistema", total: "Pipeline Total",

                status_ready: "LISTO", status_copied: "PROMPT COPIADO", status_sys_copied: "SISTEMA COPIADO",
                msg_clear: "¿Limpiar todos los campos de esta pestaña?",
                msg_delete: "¿Eliminar esta pestaña permanentemente?",

                msg_last_tab: "No se puede eliminar la única pestaña restante.",
                tut_title: "Tutorial: AI Flow Studio",
                tut_body: `
<div style="text-align:left; line-height:1.7; font-size:0.85rem;">

<h3 style="color:var(--accent-blue); margin-top:0;">Primeros Pasos</h3>
<p>AI Flow Studio te ayuda a construir prompts reutilizables y modulares para asistentes de IA. En lugar de reescribir prompts desde cero cada vez, creas <strong>plantillas</strong> con marcadores que se completan automáticamente.</p>

<h3 style="color:var(--accent-blue);">1. Flujos (Pestañas)</h3>
<p>Cada <strong>flujo</strong> es un espacio de trabajo independiente que aparece en la barra lateral izquierda.</p>
<ul>
  <li><strong>Crear un flujo:</strong> Haz clic en <em>"+ Nuevo Flujo"</em> en la parte superior de la barra lateral.</li>
  <li><strong>Cambiar de flujo:</strong> Haz clic en el nombre de cualquier flujo en la barra lateral.</li>
  <li><strong>Renombrar un flujo:</strong> Haz doble clic en el nombre del flujo para editarlo.</li>
  <li><strong>Reordenar flujos:</strong> Arrastra y suelta los flujos en la barra lateral para reorganizarlos.</li>
  <li><strong>Eliminar un flujo:</strong> Haz clic en el botón <strong>✕</strong> de la pestaña. No se puede eliminar el último flujo restante.</li>
</ul>

<h3 style="color:var(--accent-blue);">2. Bloque de Sistema</h3>
<p>El <strong>Bloque de Sistema</strong> te permite definir una persona o reglas a nivel de sistema (ej: "Eres un asistente de programación útil").</p>
<ul>
  <li>Marca la casilla <em>"Habilitar Bloque de Sistema"</em> para mostrar el editor.</li>
  <li>Cuando está habilitado, la salida generada incluirá secciones <code>SYSTEM:</code> y <code>USER:</code>.</li>
  <li>Puedes colapsar esta sección haciendo clic en su encabezado.</li>
</ul>

<h3 style="color:var(--accent-blue);">3. Plantilla de Instrucción</h3>
<p>Este es el cuerpo principal de tu prompt. Escribe tus instrucciones aquí y usa <strong>marcadores</strong> para hacerlas reutilizables.</p>
<ul>
  <li>Escribe cualquier <code>{{NOMBRE_TAG}}</code> y un campo de entrada para esa variable aparecerá automáticamente debajo.</li>
  <li>Puedes colapsar esta sección haciendo clic en su encabezado.</li>
</ul>

<h3 style="color:var(--accent-blue);">4. Variables Dinámicas</h3>
<p>Cualquier <code>{{TAG}}</code> en tu plantilla crea un campo de entrada automáticamente. Completa el valor y se inyectará cuando generes el prompt.</p>
<p><strong>Ejemplo:</strong> Una plantilla como <code>Traduce {{TEXTO}} al {{IDIOMA}}</code> crea dos campos: uno para TEXTO y otro para IDIOMA.</p>

<h3 style="color:var(--accent-blue);">5. Variables Compartidas</h3>
<p>Usa <code>{{SHARED:nombre}}</code> para variables compartidas entre <strong>todos</strong> los flujos. Si actualizas una variable compartida en un flujo, el cambio se aplica en todos.</p>
<p><strong>Ejemplo:</strong> <code>{{SHARED:contexto_proyecto}}</code> te permite definir el contexto de tu proyecto una vez y reutilizarlo en cada flujo.</p>

<h3 style="color:var(--accent-blue);">6. Enlace de Flujos</h3>
<p>Usa <code>{{TAB:NombreFlujo}}</code> para incluir la <strong>salida generada</strong> de otro flujo dentro de tu plantilla actual. Esto te permite encadenar prompts en un pipeline.</p>
<p><strong>Ejemplo:</strong> Si tienes un flujo llamado "Esquema", puedes referenciarlo con <code>{{TAB:Esquema}}</code> en otro flujo.</p>
<p><em>Nota:</em> Las dependencias circulares (Flujo A referencia a Flujo B, que referencia a Flujo A) se detectan y mostrarán un error.</p>

<h3 style="color:var(--accent-blue);">7. Generar y Copiar</h3>
<p>Haz clic en <strong>"Generar y Copiar Prompt"</strong> para ensamblar tu prompt final con todas las variables resueltas y copiarlo al portapapeles, listo para pegar en cualquier chat de IA.</p>

<h3 style="color:var(--accent-blue);">8. Herramientas Extra (Menú ⚙)</h3>
<ul>
  <li><strong>Descargar .md:</strong> Guarda la plantilla actual como archivo Markdown.</li>
  <li><strong>Copiar Sys:</strong> Copia solo el prompt de sistema al portapapeles.</li>
  <li><strong>Limpiar Campos:</strong> Reinicia todos los campos del flujo actual (la plantilla permanece, los valores se borran).</li>
</ul>

<h3 style="color:var(--accent-blue);">9. Configuración (Menú ☰ de la Barra Lateral)</h3>
<ul>
  <li><strong>Tema:</strong> Cambia entre modo Oscuro y Claro.</li>
  <li><strong>Idioma:</strong> Cambia entre Inglés y Español.</li>
  <li><strong>Exportar Config:</strong> Descarga todos tus flujos y variables compartidas como archivo JSON para respaldo o compartir.</li>
  <li><strong>Importar Config:</strong> Carga un archivo JSON previamente exportado para restaurar tus flujos.</li>
  <li><strong>Borrar Datos del Studio:</strong> Elimina todos los flujos, variables y configuraciones. <em>Esto no se puede deshacer.</em></li>
</ul>

<h3 style="color:var(--accent-blue);">10. Consejos</h3>
<ul>
  <li>Todos los datos se guardan automáticamente en tu navegador (localStorage).</li>
  <li>Cada campo muestra una marca de tiempo <em>"Modificado"</em> para saber cuándo se editó por última vez.</li>
  <li>La barra de información inferior muestra el conteo de caracteres para Sistema, Plantilla y Variables Dinámicas.</li>
  <li>Presiona <strong>Tab</strong> dentro de cualquier editor para insertar un carácter de tabulación en lugar de mover el foco.</li>
  <li>Presiona <strong>Enter</strong> para auto-indentar basándose en la indentación de la línea actual.</li>
</ul>
</div>`

        function getGMT5Time() {

        /* --- Dynamic Variable Logic --- */
        function extractVariables() {
            const templateText = document.getElementById('template').value;
            const matches = [...new Set([...templateText.matchAll(/{{([^{}]+)}}/g)].map(m => m[1]))];
            const localTags = matches.filter(v => !v.startsWith('TAB:') && !v.startsWith('SHARED:'));

            const container = document.getElementById('dynamic-inputs-container');
            const tab = tabs.find(t => t.id === activeTabId);
            const t_lang = i18n[currentLang];

            let html = '';

            // Shared variables first
            html += sharedTags.map(v => {
                const val = sharedStore.vars[v] || "";
                const timestamp = sharedStore.ts[v] ? `${t_lang.mod}: ${sharedStore.ts[v]}` : "";
                const uniqueId = `shared-${v.replace(/[^a-zA-Z0-9]/g, '_')}`;
                return `
                <div class="shared-var-block">
                    <label style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.7rem; font-weight: bold;">
                        <span>${v}<span class="shared-var-badge">${t_lang.shared}</span></span>

                                  oninput="handleDynamicInput(this)">${val}</textarea>
                    </div>
                </div>`;
            }).join('');

            // Local variables
            html += localTags.map(v => {
                const val = tab.vars[v] || "";
                const timestamp = tab.ts[v] ? `${t_lang.mod}: ${tab.ts[v]}` : "";
                const uniqueId = `local-${v.replace(/[^a-zA-Z0-9]/g, '_')}`;
                return `
                <div class="dynamic-var-block">
                    <label style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.7rem; font-weight: bold;">
                        <span>${v}</span>
                        <span id="ts-${v}" class="mod-label">${timestamp}</span>
                    </label>
                    <div class="editor-wrapper">
                        <div class="line-numbers" id="${uniqueId}-lines">1</div>
                        <textarea class="editor dynamic-input" data-var="${v}" data-lines-id="${uniqueId}-lines" style="height: 120px;"
                                  oninput="handleDynamicInput(this)">${val}</textarea>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = html;
            setupEditorListeners();
            updateCounts();
        }

        function handleDynamicInput(el) {
            const varName = el.getAttribute('data-var');
            const tab = tabs.find(t => t.id === activeTabId);
            if (varName.startsWith('SHARED:')) {
                const key = varName.substring(7);
                sharedStore.vars[key] = el.value;
                sharedStore.ts[key] = getGMT5Time();
                document.getElementById(`ts-${varName}`).innerText = `${i18n[currentLang].mod}: ${sharedStore.ts[key]}`;
                debouncedSaveShared();
            } else if (tab) {
                tab.vars[varName] = el.value;
                tab.ts[varName] = getGMT5Time();
                document.getElementById(`ts-${varName}`).innerText = `${i18n[currentLang].mod}: ${tab.ts[varName]}`;
            }
            updateCounts();
            debouncedSave();
        }

        function handleFieldInput(key) {
            const t = tabs.find(x => x.id === activeTabId);
            if (t) {
                t.ts[key] = getGMT5Time();
                if (key === 'tpl') {
                    clearTimeout(_extractTimer);
                    _extractTimer = setTimeout(extractVariables, 300);
                }
            }
            updateCounts(); debouncedSave();
        }

        function updateCounts() {
            const tab = tabs.find(x => x.id === activeTabId);
            if (!tab) return;
            const sys = document.getElementById('systemPrompt').value.length;
            const tpl = document.getElementById('template').value.length;
            let dynamicLen = 0;
            document.querySelectorAll('.dynamic-input').forEach(el => dynamicLen += el.value.length);

            const total = sys + tpl + dynamicLen;
            const t = i18n[currentLang];
            document.getElementById('char-breakdown').innerText = `${t.char_sys}: ${sys} | ${t.char_tpl}: ${tpl} | ${t.char_dyn}: ${dynamicLen}`;
            document.getElementById('total-pipeline-info').innerHTML = `${t.total}: ${total} chars`;

            document.getElementById('ts-tpl').innerText = tab.ts.tpl ? `${t.mod}: ${tab.ts.tpl}` : "";
        }

        /* --- Persistence --- */

        // Sync all dynamic input values from DOM to tab.vars (for current tab)
        function syncAllDynamicInputs() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return;
            document.querySelectorAll('.dynamic-input').forEach(el => {
                const varName = el.getAttribute('data-var');
                if (varName.startsWith('SHARED:')) {
                    const key = varName.substring(7);
                    sharedStore.vars[key] = el.value;
                } else {
                    tab.vars[varName] = el.value;
                }
            });
            saveSharedStore();
        }

        function resolveTabOutput(tabName, visitedIds = []) {
            const trimmedName = tabName.trim();
            const tab = tabs.find(t => t.name === trimmedName || t.name.toLowerCase() === trimmedName.toLowerCase());
            if (!tab) return `[[Error: Tab '${tabName}' not found]]`;
            if (visitedIds.includes(tab.id)) return `[[Error: Circular Dependency: ${tabName}]]`;

            let final = tab.template;

            // 1. Recursive TAB resolution
            final = final.replace(/{{TAB:(.*?)}}/g, (match, targetName) => {
                return resolveTabOutput(targetName.trim(), [...visitedIds, tab.id]);
            });

            // 2. Shared Vars
            final = final.replace(/{{SHARED:(.*?)}}/g, (match, key) => {
                return sharedStore.vars[key.trim()] !== undefined ? sharedStore.vars[key.trim()] : match;
            });

            // 3. Local Vars
            Object.keys(tab.vars).forEach(key => {
                final = final.replace(new RegExp(`{{${key}}}`, 'g'), tab.vars[key]);
            });

            const sys = tab.system || '';
            const output = tab.useSystem ? `SYSTEM:\n${sys}\n\nUSER:\n${final}` : final;
            return output;
        }

        function generate() {
            syncAllDynamicInputs(); // Sync all dynamic inputs to vars first
            clearTimeout(_saveTimer); // Flush any pending debounced save
            saveCurrentTabData(); // Then persist to localStorage
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return;

            const output = resolveTabOutput(tab.name);
            navigator.clipboard.writeText(output).then(() => {
                showStatus(i18n[currentLang].status_copied);
            });
        }

        /* --- Standard Components --- */
        function renderTabs() { document.getElementById('tabs-list').innerHTML = tabs.map(t => `<div class="tab ${t.id === activeTabId ? 'active' : ''}" draggable="true" ondragstart="handleDragStart(event, '${t.id}')" ondragover="handleDragOver(event)" ondrop="handleDrop(event, '${t.id}')" onclick="switchTab('${t.id}')" ondblclick="enableRename('${t.id}')"><span id="tab-text-${t.id}">${t.name}</span><input class="tab-input hidden tab-rename-input" id="tab-input-${t.id}" value="${t.name}" onblur="finishRename('${t.id}')" onkeydown="if(event.key==='Enter') finishRename('${t.id}')"><span class="tab-close" onclick="requestDeleteTab(event, '${t.id}')">✕</span></div>`).join(''); }

        function toggleSystem(f) { const c = document.getElementById('system-check'); const v = f !== undefined ? f : c.checked; c.checked = v; document.getElementById('systemPrompt-wrapper').className = v ? 'editor-wrapper' : 'editor-wrapper hidden'; saveCurrentTabData(); }

        function showModal(type, msg) { pendingAction = type; const c = document.getElementById('modal-confirm-btn'), x = document.getElementById('modal-cancel-btn'), t = document.getElementById('modal-text'), u = document.getElementById('tutorial-content'); u.classList.add('hidden'); t.classList.remove('hidden'); if (type === 'alert') { t.innerText = msg; c.innerText = i18n[currentLang].ok; x.style.display = 'none'; } else { t.innerText = i18n[currentLang][`msg_${type}`]; c.innerText = i18n[currentLang].confirm; x.innerText = i18n[currentLang].cancel; x.style.display = 'block'; } document.getElementById('modal-overlay').style.display = 'flex'; }

        function downloadMarkdown() { const t = tabs.find(x => x.id === activeTabId); const c = document.getElementById('template').value; const b = new Blob([c], { type: 'text/markdown' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `${t.name}.md`; a.click(); }
        function copySystemOnly() { navigator.clipboard.writeText(document.getElementById('systemPrompt').value).then(() => showStatus(i18n[currentLang].status_sys_copied)); }
        function setupEditorListeners() {
            // Disconnect all previous ResizeObservers to prevent leaks
            _resizeObservers.forEach(ro => ro.disconnect());
            _resizeObservers = [];

            document.querySelectorAll('.editor').forEach(a => {
                // Skip editors that already have event listeners attached
                if (_editorListenersAttached.has(a)) {
                    // Still need ResizeObserver for existing editors (old ones were disconnected above)
                    const ro = new ResizeObserver(() => syncLineNumberHeight(a));
                    ro.observe(a);

                }
                _editorListenersAttached.add(a);

                    if (e.key === 'Tab') { e.preventDefault(); const s = a.selectionStart; a.value = a.value.substring(0, s) + "\t" + a.value.substring(a.selectionEnd); a.selectionStart = a.selectionEnd = s + 1; updateLineNumbers(a); }
                    if (e.key === 'Enter') { const s = a.selectionStart; const m = a.value.substring(a.value.lastIndexOf('\n', s - 1) + 1, s).match(/^\s+/); if (m) { e.preventDefault(); const i = "\n" + m[0]; a.value = a.value.substring(0, s) + i + a.value.substring(s); a.selectionStart = a.selectionEnd = s + i.length; updateLineNumbers(a); } }
                });
                a.addEventListener('input', () => updateLineNumbers(a));
                a.addEventListener('scroll', () => syncLineNumberScroll(a));
                const ro = new ResizeObserver(() => syncLineNumberHeight(a));
                ro.observe(a);
                _resizeObservers.push(ro);
                updateLineNumbers(a);
                syncLineNumberHeight(a);
            });
        }
        function updateLineNumbers(textarea) {
            let linesEl = getLineNumbersEl(textarea);
            if (!linesEl) return;
            const lines = textarea.value.split('\n').length;
            linesEl.innerHTML = Array.from({ length: lines }, (_, i) => i + 1).join('<br>');
            syncLineNumberScroll(textarea);
            updateMaxHeight(textarea);
        }
        function updateMaxHeight(textarea) {
            // no-op: removed maxHeight constraint that prevented manual resize
        }
        function syncLineNumberScroll(textarea) {
            let linesEl = getLineNumbersEl(textarea);
            if (linesEl) linesEl.scrollTop = textarea.scrollTop;
        }
        function syncLineNumberHeight(textarea) {
            let linesEl = getLineNumbersEl(textarea);
            if (linesEl) linesEl.style.height = textarea.offsetHeight + 'px';
        }
        function getLineNumbersEl(textarea) {
            if (textarea.id === 'systemPrompt') return document.getElementById('systemPrompt-lines');
            if (textarea.id === 'template') return document.getElementById('template-lines');
            return document.getElementById(textarea.getAttribute('data-lines-id'));
        }
        function showTutorial() { const t = i18n[currentLang]; const m = document.getElementById('modal-text'); const u = document.getElementById('tutorial-content'); m.classList.add('hidden'); u.innerHTML = `<h2>${t.tut_title}</h2>${t.tut_body}`; u.classList.remove('hidden'); document.getElementById('modal-confirm-btn').innerText = t.ok; document.getElementById('modal-cancel-btn').style.display = 'none'; document.getElementById('modal-overlay').style.display = 'flex'; pendingAction = 'alert'; }

        function enableRename(id) { const span = document.getElementById('tab-text-' + id); const input = document.getElementById('tab-input-' + id); span.classList.add('hidden'); input.classList.remove('hidden'); input.focus(); input.select(); }
        function finishRename(id) { const input = document.getElementById('tab-input-' + id); const span = document.getElementById('tab-text-' + id); const t = tabs.find(x => x.id === id); if (t && input.value.trim()) t.name = input.value.trim(); input.classList.add('hidden'); span.classList.remove('hidden'); renderTabs(); saveCurrentTabData(); }

        window.onload = init;
    </script>
